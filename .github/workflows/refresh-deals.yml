name: Refresh supermarket deals

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: refresh-supermarket-deals
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch supermarket deals
  env:
    PRIJS_PROFEET_API_KEY: ${{ secrets.PRIJS_PROFEET_API_KEY }}
    STRICT_DEALS: "1"
  run: node scripts/fetch-deals.mjs

      - name: Commit updated deals
        run: |
          if git diff --quiet -- site/data/deals.json; then
            echo "No changes to supermarket deals."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add site/data/deals.json
            git commit -m "Update supermarket deals"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload website
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Deploy website
        id: deployment
        uses: actions/deploy-pages@v4
